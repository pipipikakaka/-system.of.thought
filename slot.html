<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>哲学スロット</title>

<style>

body{
margin:0;
padding:0;
font-family:sans-serif;
background:url("サー活用3.png") center/cover no-repeat fixed;
}

.main{

position:absolute;
top:50%;
left:50%;

width:1920px;
height:1080px;

transform-origin:center center;
transform:translate(-50%,-50%) scale(1);

background:url("サー活用2.png") center/contain no-repeat;

}

.slot{

position:absolute;
top:47.5%;

font-size:36px;

color:#444444;

width:400px;
height:50px;

overflow:hidden;

text-align:center;

}

#slot-seiyaku{

left:36.5%;
transform:translateX(-50%);

}

#slot-shugi{

left:69%;
transform:translateX(-50%);

}

.slot-list{

position:absolute;
width:100%;

}

.slot-item{

height:50px;
line-height:50px;

}

.btn-area{

position:absolute;

top:65%;
left:52%;

transform:translateX(-50%);

display:flex;
justify-content:center;
align-items:center;

}

button{

font-size:60px;
font-weight:bold;

padding:10px 30px;
margin:20px;

border:none;
background:none;

color:#444444;

cursor:pointer;

}

</style>
</head>

<body>

<div class="main" id="main">

<div class="slot" id="slot-seiyaku">
<div class="slot-list"></div>
</div>

<div class="slot" id="slot-shugi">
<div class="slot-list"></div>
</div>

<div class="btn-area">

<button id="spin">回す</button>
<button id="next" disabled style="opacity:0.6;">次へ</button>

</div>

</div>

<script>

function resize(){

const baseWidth=1920;
const baseHeight=1080;

const scale=Math.min(
window.innerWidth/baseWidth,
window.innerHeight/baseHeight
);

const main=document.getElementById("main");

main.style.transform=
`translate(-50%,-50%) scale(${scale})`;

}

window.addEventListener("resize",resize);
resize();


const seiyakuList=[
"差異を用いず語れ",
"否定表現を用いず語れ",
"最大限の充足を前提に語れ",
"感情論を用いず語れ",
"絶対的確実性を前提として語れ",
"因果表現を用いず語れ"
];

const shugiList=[
"相対主義",
"虚無主義",
"禁欲主義",
"快楽主義",
"懐疑主義",
"合理主義"
];

let finalSeiyaku="---";
let finalShugi="---";


function spinSlot(list,element,callback){

const slotList=element.querySelector(".slot-list");

let html="";

for(let i=0;i<30;i++){

const item=list[Math.floor(Math.random()*list.length)];

html+=`<div class="slot-item">${item}</div>`;

}

slotList.innerHTML=html;

let pos=0;
let speed=40;

const interval=setInterval(()=>{

pos+=speed;

slotList.style.top=-pos+"px";

speed*=0.96;

if(speed<1){

clearInterval(interval);

const final=list[Math.floor(Math.random()*list.length)];

slotList.innerHTML=`<div class="slot-item">${final}</div>`;

slotList.style.top="0px";

callback(final);

}

},20);

}


document.getElementById("spin").onclick=()=>{

const nextBtn=document.getElementById("next");

nextBtn.disabled=false;
nextBtn.style.opacity=1;

spinSlot(
seiyakuList,
document.getElementById("slot-seiyaku"),
(r)=>{finalSeiyaku=r;}
);

setTimeout(()=>{

spinSlot(
shugiList,
document.getElementById("slot-shugi"),
(r)=>{finalShugi=r;}
);

},400);

};


document.getElementById("next").onclick=()=>{

localStorage.setItem(
"sa-katsu-seiyaku",
finalSeiyaku
);

localStorage.setItem(
"sa-katsu-shugi",
finalShugi
);

location.href="answer.html";

};

</script>

</body>
</html>
