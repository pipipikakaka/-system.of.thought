<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>開始画面</title>
<style>
    body {
        margin: 0;
        padding: 0;
        height: 100vh;
        width: 100vw;
        background-image: url("サー活用.png");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .start-button {
        font-size: 90px;
        font-weight: 900;
        color: #444444; /* 文字色変更 */
        cursor: pointer;
        font-family: "HGP明朝B", "Yu Mincho", serif;
        transition: 0.3s;
    }

    .start-button:hover {
        transform: scale(1.1);
    }
</style>
</head>
<body>

<div class="start-button" onclick="location.href='サー活のスロット.html'">
開始
</div>

</body>
</html>
